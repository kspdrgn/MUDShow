<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <style>
      html {
        background: #000;
      }

      html,
      body {
        min-height: 100%;
        background: #000;
        color: #e8e8e8;
      }

      body {
        font-family:
          'JetBrains Mono',
          ui-monospace,
          SFMono-Regular,
          Menlo,
          Consolas,
          monospace;
        letter-spacing: 0.06em;
      }

      #app {
        width: 100%;
        min-height: 100vh;
      }

      #startup-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
      }

      .startup-shell {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #0b0b0d 0%, #050505 100%);
      }

      .startup-card {
        display: grid;
        justify-items: center;
        gap: 0.75rem;
        padding: 1.25rem 1.5rem;
      }

      .startup-title {
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.32em;
        color: #e8e8e8;
      }

      .startup-copy {
        font-size: 0.72rem;
        color: #8a8a8a;
        text-transform: uppercase;
        letter-spacing: 0.24em;
      }

      .startup-pulse {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        height: 1rem;
      }

      .startup-pulse span {
        width: 0.42rem;
        height: 0.42rem;
        border-radius: 999px;
        background: #e8e8e8;
        opacity: 0.2;
        animation: startupPulse 1.1s infinite ease-in-out;
      }

      .startup-pulse span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .startup-pulse span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes startupPulse {
        0%,
        80%,
        100% {
          opacity: 0.2;
          transform: translateY(0);
        }

        40% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }
    </style>
    <title>MUDShow</title>
  </head>
  <body>
    <div id="startup-overlay" aria-hidden="true">
      <div class="startup-shell">
        <div class="startup-card">
          <div class="startup-title">MUDShow</div>
          <div class="startup-copy">Loading webview</div>
          <div class="startup-pulse" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>
    <div id="app">
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
