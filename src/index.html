<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUDShow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  @font-face {
    font-family: 'JetBrains Mono';
    src: url('JetBrainsMono.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000;
    --surface: #0a0a0a;
    --border: #1e1e1e;
    --border-active: #333;
    --text: #c8c8c8;
    --text-dim: #555;
    --text-bright: #e8e8e8;
    --accent: #4a9eff;
    --accent-dim: #1a3a5c;
    --danger: #c0392b;
    --danger-dim: #3a0a08;
    --input-bg: #050505;
    --font-mono: 'JetBrains Mono', monospace;
    --font-ui: 'Share Tech Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ── CHARACTER LIST SCREEN ── */

  #screen-list {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 2rem;
  }

  #screen-list h1 {
    font-family: var(--font-ui);
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  #char-list {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .char-row {
    display: flex;
    align-items: center;
    background: var(--bg);
    padding: 0.6rem 0.8rem;
    gap: 0.5rem;
    transition: background 0.1s;
  }

  .char-row:hover { background: var(--surface); }

  .char-name {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 0.95rem;
    color: var(--text-bright);
    cursor: default;
  }

  .char-host {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-right: 0.5rem;
  }

  .char-actions { display: flex; gap: 4px; }

  .btn {
    font-family: var(--font-ui);
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border: 1px solid var(--border-active);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s, background 0.1s;
    text-transform: uppercase;
  }

  .btn:hover { color: var(--text-bright); border-color: var(--text-dim); }

  .btn.primary {
    border-color: var(--accent-dim);
    color: var(--accent);
  }
  .btn.primary:hover { background: var(--accent-dim); border-color: var(--accent); }

  .btn.danger { border-color: var(--danger-dim); color: var(--danger); }
  .btn.danger:hover { background: var(--danger-dim); border-color: var(--danger); }

  #list-footer {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: flex-end;
  }

  #empty-state {
    width: 100%;
    max-width: 480px;
    padding: 1.5rem;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
    border: 1px solid var(--border);
    display: none;
  }

  /* ── MODAL ── */

  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  #modal-overlay.open { display: flex; }

  #modal {
    background: var(--surface);
    border: 1px solid var(--border-active);
    padding: 1.5rem;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  #modal h2 {
    font-family: var(--font-ui);
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 400;
  }

  .field { display: flex; flex-direction: column; gap: 4px; }

  .field label {
    font-family: var(--font-ui);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .field input {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text-bright);
    padding: 6px 8px;
    outline: none;
    transition: border-color 0.1s;
  }

  .field input:focus { border-color: var(--border-active); }

  .field-check label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .field-check input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* ── PLAY SCREEN ── */

  #screen-play {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  #screen-play.active { display: flex; }

  #output-area {
    flex: 1;
    overflow-y: scroll;
    overflow-x: hidden;
    padding: 0.5rem 0.7rem;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
    word-break: normal;
    overflow-wrap: break-word;
    max-width: 82ch;
    width: 100%;
    margin: 0 auto;
  }

  #output-area::-webkit-scrollbar { width: 4px; }
  #output-area::-webkit-scrollbar-track { background: transparent; }
  #output-area::-webkit-scrollbar-thumb { background: var(--border-active); }

  /* ANSI colors */
  .ansi-30 { color: #3d3d3d; } .ansi-31 { color: #c0392b; }
  .ansi-32 { color: #27ae60; } .ansi-33 { color: #d4ac0d; }
  .ansi-34 { color: #2980b9; } .ansi-35 { color: #8e44ad; }
  .ansi-36 { color: #16a085; } .ansi-37 { color: #bdc3c7; }
  .ansi-90 { color: #555; }    .ansi-91 { color: #e74c3c; }
  .ansi-92 { color: #2ecc71; } .ansi-93 { color: #f1c40f; }
  .ansi-94 { color: #3498db; } .ansi-95 { color: #9b59b6; }
  .ansi-96 { color: #1abc9c; } .ansi-97 { color: #ecf0f1; }
  .ansi-1  { font-weight: 600; color: var(--text-bright); }

  /* ── NOTES PANEL ── */

  #notes-panel {
    display: none;
    flex-shrink: 0;
    height: 50%;
    border-bottom: 1px solid var(--border);
  }

  #notes-panel.open { display: flex; flex-direction: column; }

  #notes-label {
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #notes-editor {
    flex: 1;
    resize: none;
    background: var(--input-bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.55;
    border: none;
    outline: none;
    padding: 0.5rem 0.7rem;
  }

  /* ── HIGHLIGHTS PANEL ── */

  #highlights-panel {
    display: none;
    flex-shrink: 0;
    height: 50%;
    border-bottom: 1px solid var(--border);
    flex-direction: column;
  }

  #highlights-panel.open { display: flex; }

  #highlights-label {
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #highlights-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.4rem 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border-active) transparent;
  }

  .highlight-row {
    display: flex;
    align-items: center;
    padding: 3px 8px;
    gap: 8px;
  }

  .highlight-row:hover { background: var(--surface); }

  .highlight-swatch {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
    border: 1px solid var(--border-active);
  }

  .highlight-pattern {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--text);
  }

  #highlights-add {
    display: flex;
    gap: 6px;
    padding: 6px 8px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #highlights-add input[type=text] {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text-bright);
    padding: 4px 6px;
    outline: none;
  }

  #highlights-add input[type=text]:focus { border-color: var(--border-active); }

  #highlights-add input[type=color] {
    width: 32px;
    height: 26px;
    padding: 1px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    cursor: pointer;
  }

  /* ── INPUT BARS ── */

  #input-area {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    width: 100%;
  }

  #input-area-inner {
    display: flex;
    flex-direction: column;
    gap: 1px;
    max-width: 82ch;
    width: 100%;
    margin: 0 auto;
    background: var(--border);
  }

  .input-bar {
    display: flex;
    align-items: center;
    background: var(--input-bg);
    position: relative;
  }

  .input-indicator {
    font-family: var(--font-ui);
    font-size: 0.6rem;
    color: var(--text-dim);
    padding: 0 6px;
    letter-spacing: 0.1em;
    flex-shrink: 0;
    user-select: none;
  }

  .input-bar.focused .input-indicator { color: var(--accent); }
  .input-bar.focused { background: var(--input-active); }

  .mud-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-bright);
    padding: 6px 0;
    caret-color: var(--accent);
  }

  /* scrollbar for output */
  #output-area { scrollbar-width: thin; scrollbar-color: var(--border-active) transparent; }
  #notes-editor { scrollbar-width: thin; scrollbar-color: var(--border-active) transparent; }

  /* connection status dot */
  #status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
    margin: 0 8px;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  #status-dot.connected { background: #27ae60; }
  #status-dot.error { background: var(--danger); }
</style>
</head>
<body>

<!-- CHARACTER LIST -->
<div id="screen-list">
  <h1>MUDShow</h1>
  <div id="empty-state">no characters yet — add one below</div>
  <div id="char-list"></div>
  <div id="list-footer">
    <button class="btn primary" onclick="openModal()">+ add character</button>
  </div>
</div>

<!-- PLAY SCREEN -->
<div id="screen-play">
  <div id="highlights-panel">
    <div id="highlights-label">highlights</div>
    <div id="highlights-list"></div>
    <div id="highlights-add">
      <input type="text" id="highlight-input" placeholder="text to highlight..." autocomplete="off" spellcheck="false">
      <input type="color" id="highlight-color" value="#f1c40f">
      <button class="btn primary" onclick="addHighlight()">add</button>
    </div>
  </div>
  <div id="notes-panel">
    <div id="notes-label">notes</div>
    <textarea id="notes-editor" spellcheck="false" placeholder="notes for this character..."></textarea>
  </div>
  <div id="output-area"></div>
  <div id="input-area">
    <div id="input-area-inner">
      <div class="input-bar focused" id="bar1">
        <span class="input-indicator">F1</span>
        <input class="mud-input" id="input1" type="text" autocomplete="off" spellcheck="false">
        <div id="status-dot"></div>
      </div>
      <div class="input-bar" id="bar2">
        <span class="input-indicator">F2</span>
        <input class="mud-input" id="input2" type="text" autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title">add character</h2>
    <div class="field">
      <label>name</label>
      <input id="field-name" type="text" autocomplete="off">
    </div>
    <div class="field">
      <label>host</label>
      <input id="field-host" type="text" autocomplete="off" placeholder="mush.example.org">
    </div>
    <div class="field">
      <label>port</label>
      <input id="field-port" type="number" autocomplete="off" placeholder="4201">
    </div>
    <div class="field field-check">
      <label><input id="field-tls" type="checkbox" checked> use TLS</label>
    </div>
    <div class="field">
      <label>output width (characters)</label>
      <input id="field-width" type="number" autocomplete="off" placeholder="82" min="40" max="300">
    </div>
    <div class="field field-check">
      <label><input id="field-sound" type="checkbox"> sound on activity when unfocused</label>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">cancel</button>
      <button class="btn primary" onclick="saveCharacter()">save</button>
    </div>
  </div>
</div>

<script>
// ── STORAGE ──────────────────────────────────────────────────────────────────

const PROXY = 'ws://localhost:8080';

function getChars() {
  return JSON.parse(localStorage.getItem('mudshow_chars') || '[]');
}

function saveChars(chars) {
  localStorage.setItem('mudshow_chars', JSON.stringify(chars));
}

function getNotes(charName) {
  return localStorage.getItem('mudshow_notes_' + charName) || '';
}

function saveNotes(charName, text) {
  localStorage.setItem('mudshow_notes_' + charName, text);
}

function getHighlights() {
  return JSON.parse(localStorage.getItem('mudshow_highlights') || '[]');
}

function saveHighlights(rules) {
  localStorage.setItem('mudshow_highlights', JSON.stringify(rules));
  highlightsCache = rules;
  highlightsRegexCache = rules.map(r => ({
    re: new RegExp(r.pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
    color: r.color
  }));
}

let highlightsCache = getHighlights();
let highlightsRegexCache = highlightsCache.map(r => ({
  re: new RegExp(r.pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
  color: r.color
}));

// ── CHARACTER LIST ────────────────────────────────────────────────────────────

function renderList() {
  const chars = getChars();
  const list = document.getElementById('char-list');
  const empty = document.getElementById('empty-state');

  list.innerHTML = '';

  if (chars.length === 0) {
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  chars.forEach((char, i) => {
    const row = document.createElement('div');
    row.className = 'char-row';
    row.innerHTML = `
      <span class="char-name">${esc(char.name)}</span>
      <span class="char-host">${esc(char.host)}:${char.port}</span>
      <div class="char-actions">
        <button class="btn primary" onclick="connect(${i})">connect</button>
        <button class="btn" onclick="openModal(${i})">edit</button>
        <button class="btn danger" onclick="deleteChar(${i})">del</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────

let editingIndex = null;

function openModal(index) {
  editingIndex = (index !== undefined) ? index : null;
  const chars = getChars();
  const title = document.getElementById('modal-title');

  if (editingIndex !== null) {
    const c = chars[editingIndex];
    document.getElementById('field-name').value = c.name;
    document.getElementById('field-host').value = c.host;
    document.getElementById('field-port').value = c.port;
    document.getElementById('field-tls').checked = c.tls !== false;
    document.getElementById('field-width').value = c.width || 82;
    document.getElementById('field-sound').checked = c.sound === true;
    title.textContent = 'edit character';
  } else {
    document.getElementById('field-name').value = '';
    document.getElementById('field-host').value = '';
    document.getElementById('field-port').value = '';
    document.getElementById('field-tls').checked = true;
    document.getElementById('field-width').value = 82;
    document.getElementById('field-sound').checked = false;
    title.textContent = 'add character';
  }

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('field-name').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function saveCharacter() {
  const name = document.getElementById('field-name').value.trim();
  const host = document.getElementById('field-host').value.trim();
  const port = parseInt(document.getElementById('field-port').value);
  const tls = document.getElementById('field-tls').checked;
  const width = parseInt(document.getElementById('field-width').value) || 82;
  const sound = document.getElementById('field-sound').checked;

  if (!name || !host || !port) return;

  const chars = getChars();

  if (editingIndex !== null) {
    chars[editingIndex] = { name, host, port, tls, width, sound };
  } else {
    chars.push({ name, host, port, tls, width, sound });
  }

  saveChars(chars);
  closeModal();
  renderList();
}

function deleteChar(index) {
  const chars = getChars();
  chars.splice(index, 1);
  saveChars(chars);
  renderList();
}

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    saveCharacter();
  }
});

// ── CONNECTION ────────────────────────────────────────────────────────────────

let ws = null;
let currentChar = null;
let documentHasFocus = true;
let hasNewActivity = false;

function playBeep() {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 1100;
    const now = ctx.currentTime;
    const attackSec = 0.2;
    const durSec = 0.55;
    gain.gain.setValueAtTime(0.001, now);
    gain.gain.linearRampToValueAtTime(0.3, now + attackSec);
    gain.gain.exponentialRampToValueAtTime(0.001, now + durSec);
    osc.start(now);
    osc.stop(now + durSec);
  } catch (e) {}
}

function connect(index) {
  const char = getChars()[index];
  currentChar = char;

  document.getElementById('screen-list').style.display = 'none';
  document.getElementById('screen-play').classList.add('active');
  document.title = char.name;
  document.getElementById('output-area').style.maxWidth = (char.width || 82) + 'ch';
  document.getElementById('input-area-inner').style.maxWidth = (char.width || 82) + 'ch';

  // load notes
  document.getElementById('notes-editor').value = getNotes(char.name);

  // connect
  const url = `${PROXY}?host=${encodeURIComponent(char.host)}&port=${char.port}&tls=${char.tls !== false}`;
  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  const dot = document.getElementById('status-dot');

  ws.onopen = () => {
    dot.className = 'connected';
    appendOutput(`\x1b[90m[connected to ${char.host}:${char.port}]\x1b[0m\n`);
  };

  ws.onmessage = (e) => {
    const text = typeof e.data === 'string' ? e.data :
      new TextDecoder().decode(e.data);
    appendOutput(text);
    if (document.hidden) {
      if (!hasNewActivity) {
        if (char.sound) playBeep();
        document.title = '* ' + char.name;
      }
      hasNewActivity = true;
    }
  };

  ws.onclose = () => {
    dot.className = 'error';
    appendOutput(`\x1b[90m[disconnected — press F5 to reconnect]\x1b[0m\n`);
  };

  ws.onerror = () => {
    dot.className = 'error';
    appendOutput(`\x1b[31m[connection error]\x1b[0m\n`);
  };

  document.getElementById('input1').focus();
}

// ── OUTPUT ────────────────────────────────────────────────────────────────────

let userScrolled = false;
let programmingScroll = false;

const outputEl = document.getElementById('output-area');

outputEl.addEventListener('scroll', () => {
  if (programmingScroll) return;
  const dist = outputEl.scrollHeight - outputEl.scrollTop - outputEl.clientHeight;
  userScrolled = dist > 50;
});

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    if (hasNewActivity) {
      hasNewActivity = false;
      if (currentChar) document.title = currentChar.name;
    }
    if (!userScrolled) outputEl.scrollTop = outputEl.scrollHeight;
  }
});

// tracks whether last chunk ended with a line break
let outputEndsWithBr = true;

function appendOutput(text) {
  // strip telnet IAC sequences (0xFF + following bytes)
  text = text.replace(/\xff[\xfb-\xfe]./gs, '').replace(/\xff\xf0/gs, '');

  harvestWords(text);
  let html = ansiToHtml(text);
  html = applyHighlights(html);

  // if previous output ended mid-line and new content doesn't start with a break, add one
  if (!outputEndsWithBr && !html.startsWith('<br>')) {
    html = '<br>' + html;
  }

  outputEndsWithBr = /<br>\s*(?:<\/[^>]+>)*\s*$/.test(html);

  const span = document.createElement('span');
  span.innerHTML = html;
  outputEl.appendChild(span);

  // cap output buffer to prevent unbounded DOM growth
  while (outputEl.children.length > 2000) {
    outputEl.removeChild(outputEl.firstChild);
  }

  if (!userScrolled) {
    programmingScroll = true;
    outputEl.scrollTop = outputEl.scrollHeight;
    setTimeout(() => { programmingScroll = false; }, 100);
  }
}

function ansiToHtml(text) {
  // escape HTML first
  text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  let result = '';
  let openSpan = false;

  // process ANSI escape sequences
  const parts = text.split(/(\x1b\[[0-9;]*m)/);
  for (const part of parts) {
    if (part.startsWith('\x1b[')) {
      const codes = part.slice(2, -1).split(';').map(Number);
      const hasReset = codes.includes(0);
      if (hasReset && openSpan) { result += '</span>'; openSpan = false; }
      const classes = codes.filter(c => c !== 0).map(c => 'ansi-' + c);
      if (classes.length) {
        if (openSpan) { result += '</span>'; }
        result += `<span class="${classes.join(' ')}">`;
        openSpan = true;
      }
    } else {
      result += part.replace(/\n/g, '<br>').replace(/ {2,}/g, m => '&nbsp;'.repeat(m.length));
    }
  }

  if (openSpan) result += '</span>';
  return result;
}

let activeBar = 1;

function setActiveBar(n) {
  activeBar = n;
  document.getElementById('bar1').classList.toggle('focused', n === 1);
  document.getElementById('bar2').classList.toggle('focused', n === 2);
  document.getElementById('input' + n).focus();
}

// ── INPUT & TAB COMPLETION ────────────────────────────────────────────────────

const wordList = new Map(); // lowercase key -> original case value
let tabMatches = [];
let tabIndex = -1;
let tabPrefix = '';

function harvestWords(text) {
  const clean = text.replace(/\x1b\[[0-9;]*m/g, '');
  const words = clean.match(/[a-zA-Z']{3,}/g);
  if (words) words.forEach(w => {
    const key = w.toLowerCase();
    if (wordList.has(key)) wordList.delete(key);
    wordList.set(key, w);
    if (wordList.size > 2000) wordList.delete(wordList.keys().next().value);
  });
}

['input1', 'input2'].forEach((id, i) => {
  const el = document.getElementById(id);
  const barNum = i + 1;

  el.addEventListener('focus', () => setActiveBar(barNum));

  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(el.value + '\r\n');
      el.value = '';
      if (!userScrolled) outputEl.scrollTop = outputEl.scrollHeight;
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const val = el.value;
      const pos = el.selectionStart;
      const before = val.slice(0, pos);
      const match = before.match(/(\S+)$/);
      if (!match) return;
      const prefix = match[1].toLowerCase();

      if (prefix !== tabPrefix || tabMatches.length === 0) {
        tabPrefix = prefix;
        tabMatches = [...wordList.entries()]
          .filter(([k]) => k.startsWith(prefix) && k !== prefix)
          .map(([, v]) => v)
          .sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
        tabIndex = -1;
      }

      if (tabMatches.length === 0) return;
      tabIndex = (tabIndex + 1) % tabMatches.length;
      const completion = tabMatches[tabIndex];
      const newVal = before.slice(0, before.length - prefix.length) + completion + val.slice(pos);
      el.value = newVal;
      const newPos = pos - prefix.length + completion.length;
      el.setSelectionRange(newPos, newPos);
    } else if (e.key !== 'Shift') {
      tabMatches = [];
      tabIndex = -1;
      tabPrefix = '';
    }
  });
});

function renderHighlights() {
  const list = document.getElementById('highlights-list');
  const rules = highlightsCache;
  list.innerHTML = '';
  if (rules.length === 0) {
    list.innerHTML = '<div style="padding:0.5rem 0.8rem;color:var(--text-dim);font-size:0.8rem;">no highlights yet</div>';
    return;
  }
  rules.forEach((rule, i) => {
    const row = document.createElement('div');
    row.className = 'highlight-row';
    row.innerHTML = `
      <div class="highlight-swatch" style="background:${rule.color}"></div>
      <span class="highlight-pattern">${esc(rule.pattern)}</span>
      <button class="btn danger" onclick="deleteHighlight(${i})">del</button>
    `;
    list.appendChild(row);
  });
}

function addHighlight() {
  const pattern = document.getElementById('highlight-input').value.trim();
  const color = document.getElementById('highlight-color').value;
  if (!pattern) return;
  const rules = [...highlightsCache, { pattern, color }];
  saveHighlights(rules);
  document.getElementById('highlight-input').value = '';
  renderHighlights();
}

function deleteHighlight(index) {
  const rules = [...highlightsCache];
  rules.splice(index, 1);
  saveHighlights(rules);
  renderHighlights();
}

document.getElementById('highlight-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addHighlight();
});

document.getElementById('notes-editor').addEventListener('input', () => {
  if (currentChar) saveNotes(currentChar.name, document.getElementById('notes-editor').value);
});

function applyHighlights(html) {
  if (highlightsRegexCache.length === 0) return html;
  return html.split(/(<[^>]+>)/).map(part => {
    if (part.startsWith('<')) return part;
    for (const { re, color } of highlightsRegexCache) {
      re.lastIndex = 0; // reset stateful regex
      part = part.replace(re, match => `<span style="color:${color}">${match}</span>`);
    }
    return part;
  }).join('');
}

// ── GLOBAL HOTKEYS ────────────────────────────────────────────────────────────

function togglePanel(panelId, otherId, onOpen) {
  const panel = document.getElementById(panelId);
  const isOpening = !panel.classList.contains('open');
  document.getElementById(otherId).classList.remove('open');
  panel.classList.toggle('open', isOpening);
  if (isOpening) onOpen();
  else document.getElementById('input' + activeBar).focus();
}

document.addEventListener('keydown', (e) => {
  if (document.getElementById('modal-overlay').classList.contains('open')) return;
  if (!document.getElementById('screen-play').classList.contains('active')) return;
  if (e.key === 'F1') { e.preventDefault(); setActiveBar(1); }
  if (e.key === 'F2') { e.preventDefault(); setActiveBar(2); }
  if (e.key === 'F3') { e.preventDefault(); togglePanel('notes-panel', 'highlights-panel', () => document.getElementById('notes-editor').focus()); }
  if (e.key === 'F4') { e.preventDefault(); togglePanel('highlights-panel', 'notes-panel', () => { renderHighlights(); document.getElementById('highlight-input').focus(); }); }
});

// ── INIT ──────────────────────────────────────────────────────────────────────

renderList();
