name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  web-and-backend:
    name: Build frontend and backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  desktop-release:
    name: Build desktop release artifact
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: 6.7.x

      - name: Determine version
        id: version
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Stamp desktop version
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.semVer }}'
          $buildInstallers = '${{ github.event_name }}' -eq 'push' -and '${{ github.ref_name }}' -eq 'main'
          $bundleTargets = if ($buildInstallers) { @('msi', 'nsis') } else { @('app') }
          $configPath = 'tauri/tauri.conf.json'
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $config.version = $version
          $config.bundle.targets = $bundleTargets
          $config | ConvertTo-Json -Depth 10 | Set-Content $configPath -Encoding utf8

      - name: Build desktop bundle
        run: pnpm tauri:build

      - name: Stage desktop release files
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.semVer }}'
          $buildInstallers = '${{ github.event_name }}' -eq 'push' -and '${{ github.ref_name }}' -eq 'main'
          $stageRoot = "artifacts\desktop-release"
          Copy-Item "tauri\target\release\mudshow.exe" "$stageRoot\mudshow-$version.exe" -Force
          if ($buildInstallers) {
            New-Item -ItemType Directory -Force -Path "$stageRoot\bundle\msi" | Out-Null
            New-Item -ItemType Directory -Force -Path "$stageRoot\bundle\nsis" | Out-Null
            Copy-Item "tauri\target\release\bundle\msi\*.msi" "$stageRoot\bundle\msi" -Force
            Copy-Item "tauri\target\release\bundle\nsis\*.exe" "$stageRoot\bundle\nsis" -Force
          }
          Set-Content "$stageRoot\version.txt" $version -Encoding utf8

      - name: Upload desktop release artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release
          path: artifacts/desktop-release
          if-no-files-found: error
