name: CI

env:
  NODE_VERSION: 26

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Build frontend bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:frontend

  desktop-release:
    name: Build Windows desktop release artifact
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: 6.7.x

      - name: Determine version
        id: version
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Stamp desktop version
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.semVer }}'
          $buildInstallers = '${{ github.event_name }}' -eq 'push' -and '${{ github.ref_name }}' -eq 'main'
          $bundleTargets = if ($buildInstallers) { @('msi', 'nsis') } else { @('app') }
          $configPath = 'tauri/tauri.conf.json'
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $config.version = $version
          $config.bundle.targets = $bundleTargets
          $config | ConvertTo-Json -Depth 10 | Set-Content $configPath -Encoding utf8

      - name: Build desktop bundle
        run: npm run build

      - name: Stage desktop release files
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.semVer }}'
          $buildInstallers = '${{ github.event_name }}' -eq 'push' -and '${{ github.ref_name }}' -eq 'main'
          $stageRoot = "artifacts\desktop-release"
          New-Item -ItemType Directory -Force -Path "$stageRoot\exe" | Out-Null
          New-Item -ItemType Directory -Force -Path "$stageRoot\meta" | Out-Null
          Copy-Item "tauri\target\release\mudshow.exe" "$stageRoot\exe\mudshow-win-x64-$version.exe" -Force
          if ($buildInstallers) {
            New-Item -ItemType Directory -Force -Path "$stageRoot\msi" | Out-Null
            New-Item -ItemType Directory -Force -Path "$stageRoot\nsis" | Out-Null
            Copy-Item "tauri\target\release\bundle\msi\*.msi" "$stageRoot\msi\MUDShow_win_x64_setup_$version.msi" -Force
            Copy-Item "tauri\target\release\bundle\nsis\*.exe" "$stageRoot\nsis\MUDShow_win_x64_setup_$version.exe" -Force
          }
          Set-Content "$stageRoot\meta\version.txt" $version -Encoding utf8

      - name: Upload raw exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: mudshow-win-x64-exe-${{ steps.version.outputs.semVer }}
          path: artifacts/desktop-release/exe/mudshow-win-x64-*.exe
          if-no-files-found: error

      - name: Upload MSI artifact
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        uses: actions/upload-artifact@v4
        with:
          name: mudshow-win-x64-msi-${{ steps.version.outputs.semVer }}
          path: artifacts/desktop-release/msi/MUDShow_win_x64_setup_*.msi
          if-no-files-found: error

      - name: Upload NSIS artifact
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        uses: actions/upload-artifact@v4
        with:
          name: mudshow-win-x64-nsis-${{ steps.version.outputs.semVer }}
          path: artifacts/desktop-release/nsis/MUDShow_win_x64_setup_*.exe
          if-no-files-found: error

      - name: Upload version artifact
        uses: actions/upload-artifact@v4
        with:
          name: mudshow-version-${{ steps.version.outputs.semVer }}
          path: artifacts/desktop-release/meta/version.txt
          if-no-files-found: error

  linux-desktop-release:
    name: Build Linux desktop executable artifact
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Install dependencies
        run: npm ci

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: 6.7.x

      - name: Determine version
        id: version
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Stamp desktop version
        shell: bash
        run: |
          version='${{ steps.version.outputs.semVer }}'
          node -e "const fs=require('fs'); const path='tauri/tauri.conf.json'; const config=JSON.parse(fs.readFileSync(path, 'utf8')); config.version=process.argv[1]; fs.writeFileSync(path, JSON.stringify(config, null, 2) + '\n');" "$version"

      - name: Build desktop executable
        run: npm run build -- --no-bundle

      - name: Stage Linux desktop release file
        shell: bash
        run: |
          version='${{ steps.version.outputs.semVer }}'
          stage_root='artifacts/desktop-release/linux'
          mkdir -p "$stage_root"
          cp tauri/target/release/mudshow "$stage_root/mudshow-linux-x64-$version"

      - name: Upload Linux executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: mudshow-linux-x64-exe-${{ steps.version.outputs.semVer }}
          path: artifacts/desktop-release/linux/mudshow-linux-x64-*
          if-no-files-found: error
