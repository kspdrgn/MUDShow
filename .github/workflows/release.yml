name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  actions: read

jobs:
  publish:
    name: Publish desktop release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download desktop release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mudshow-*
          merge-multiple: true
          path: ${{ runner.temp }}/desktop-release
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load version
        id: meta
        shell: bash
        run: |
          version="$(cat "${{ runner.temp }}/desktop-release/version.txt")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: List downloaded desktop release files
        shell: bash
        run: find "${{ runner.temp }}/desktop-release" -type f -printf '%P\n' | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          working_directory: ${{ runner.temp }}/desktop-release
          tag_name: v${{ steps.meta.outputs.version }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          name: MUDShow ${{ steps.meta.outputs.version }}
          files: |
            **/mudshow-win-x64-*.exe
            **/mudshow-linux-x64-*
            **/MUDShow_win_x64_setup_*.exe
            **/MUDShow_win_x64_setup_*.msi
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
