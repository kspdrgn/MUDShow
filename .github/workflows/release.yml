name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  actions: read

jobs:
  publish:
    name: Publish desktop release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download desktop release artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-release
          path: ${{ runner.temp }}/desktop-release
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load version
        id: meta
        shell: bash
        run: |
          version="$(cat "${{ runner.temp }}/desktop-release/version.txt")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          working_directory: ${{ runner.temp }}/desktop-release
          tag_name: v${{ steps.meta.outputs.version }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          name: MUDShow ${{ steps.meta.outputs.version }}
          files: |
            mudshow-${{ steps.meta.outputs.version }}.exe
            bundle/msi/*.msi
            bundle/nsis/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
