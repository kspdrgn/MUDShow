# Allows the frontend to enumerate installed system font families and faces.

[[permission]]
identifier = "allow-list-system-fonts"
description = "Enables the list_system_fonts command without any pre-configured scope."
commands.allow = ["list_system_fonts"]

[[permission]]
identifier = "deny-list-system-fonts"
description = "Denies the list_system_fonts command without any pre-configured scope."
commands.deny = ["list_system_fonts"]
