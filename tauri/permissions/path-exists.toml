# Allows the frontend to check whether a log file path exists.

[[permission]]
identifier = "allow-path-exists"
description = "Enables the path_exists command without any pre-configured scope."
commands.allow = ["path_exists"]

[[permission]]
identifier = "deny-path-exists"
description = "Denies the path_exists command without any pre-configured scope."
commands.deny = ["path_exists"]
