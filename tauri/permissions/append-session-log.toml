# Allows the frontend to append to an active session log.

[[permission]]
identifier = "allow-append-session-log"
description = "Enables the append_session_log command without any pre-configured scope."
commands.allow = ["append_session_log"]

[[permission]]
identifier = "deny-append-session-log"
description = "Denies the append_session_log command without any pre-configured scope."
commands.deny = ["append_session_log"]
