# Allows the frontend to rename an active session log.

[[permission]]
identifier = "allow-rename-session-log"
description = "Enables the rename_session_log command without any pre-configured scope."
commands.allow = ["rename_session_log"]

[[permission]]
identifier = "deny-rename-session-log"
description = "Denies the rename_session_log command without any pre-configured scope."
commands.deny = ["rename_session_log"]
