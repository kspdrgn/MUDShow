# Allows the frontend to load the persisted app storage.

[[permission]]
identifier = "allow-load-app-storage"
description = "Enables the load_app_storage command without any pre-configured scope."
commands.allow = ["load_app_storage"]

[[permission]]
identifier = "deny-load-app-storage"
description = "Denies the load_app_storage command without any pre-configured scope."
commands.deny = ["load_app_storage"]
