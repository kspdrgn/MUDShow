# Allows the frontend to create a session log file.

[[permission]]
identifier = "allow-create-session-log"
description = "Enables the create_session_log command without any pre-configured scope."
commands.allow = ["create_session_log"]

[[permission]]
identifier = "deny-create-session-log"
description = "Denies the create_session_log command without any pre-configured scope."
commands.deny = ["create_session_log"]
