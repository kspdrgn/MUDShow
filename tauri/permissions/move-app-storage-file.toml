# Allows the frontend to relocate the active app storage file.

[[permission]]
identifier = "allow-move-app-storage-file"
description = "Enables the move_app_storage_file command without any pre-configured scope."
commands.allow = ["move_app_storage_file"]

[[permission]]
identifier = "deny-move-app-storage-file"
description = "Denies the move_app_storage_file command without any pre-configured scope."
commands.deny = ["move_app_storage_file"]
