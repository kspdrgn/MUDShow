# Allows the frontend to set the active app storage file location.

[[permission]]
identifier = "allow-set-app-storage-path"
description = "Enables the set_app_storage_path command without any pre-configured scope."
commands.allow = ["set_app_storage_path"]

[[permission]]
identifier = "deny-set-app-storage-path"
description = "Denies the set_app_storage_path command without any pre-configured scope."
commands.deny = ["set_app_storage_path"]
