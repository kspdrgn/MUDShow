# Automatically generated-style app permissions for MUDShow.

[default]
description = "Default permissions for the MUDShow desktop app."
permissions = [
  "allow-connect-mud",
  "allow-send-mud",
  "allow-disconnect-mud",
  "allow-get-app-storage-path",
  "allow-set-app-storage-path",
  "allow-load-app-storage",
  "allow-save-app-storage",
  "allow-reveal-app-storage-file",
  "allow-pick-app-storage-file",
  "allow-move-app-storage-file",
  "allow-get-default-log-folder",
  "allow-move-default-log-folder",
  "allow-reveal-default-log-folder",
  "allow-resolve-default-log-folder",
  "allow-create-session-log",
  "allow-path-exists",
  "allow-append-session-log",
  "allow-rename-session-log",
  "allow-reveal-session-log-file",
  "allow-window-minimize",
  "allow-window-toggle-maximize",
  "allow-window-close",
  "allow-window-request-attention",
  "allow-window-start-dragging",
  "allow-window-start-resize-dragging",
  "allow-window-open-devtools",
  "allow-open-external-url",
  "core:window:allow-start-dragging",
]
