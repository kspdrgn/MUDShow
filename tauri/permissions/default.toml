# Automatically generated-style app permissions for MUDShow.

[default]
description = "Default permissions for the MUDShow desktop app."
permissions = [
  "allow-connect-mud",
  "allow-send-mud",
  "allow-disconnect-mud",
  "allow-get-app-storage-path",
  "allow-load-app-storage",
  "allow-save-app-storage",
  "allow-window-minimize",
  "allow-window-toggle-maximize",
  "allow-window-close",
  "allow-window-start-dragging",
  "core:window:allow-start-dragging",
]
